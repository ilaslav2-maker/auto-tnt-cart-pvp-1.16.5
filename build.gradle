plugins {
    id 'java'
}

version = '1.0'
group = 'com.example.tntmacro'
archivesBaseName = 'tntmacro'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://minecraft.net' }
}

dependencies {
    // Подтягиваем библиотеки ввода и сети самого Майнкрафта
    implementation 'org.lwjgl:lwjgl-glfw:3.2.2'
    implementation 'io.netty:netty-all:4.1.25.Final'
}

jar {
    manifest {
        attributes([
            "Specification-Title": "tntmacro",
            "Specification-Vendor": "AI",
            "Specification-Version": "1",
            "Implementation-Title": "tntmacro",
            "Implementation-Version": "1.0",
            "Implementation-Vendor": "AI"
        ])
    }
}
