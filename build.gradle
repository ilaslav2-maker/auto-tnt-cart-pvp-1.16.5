plugins {
    id 'java'
}

version = '1.0'
group = 'com.example.tntmacro'
archivesBaseName = 'tntmacro'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

repositories {
    mavenCentral()
}

// Заставляем сборщик игнорировать отсутствие библиотек Майна при компиляции в облаке
tasks.withType(JavaCompile) {
    options.compilerArgs << "-Xlint:none"
    options.failOnError = false
}

jar {
    manifest {
        attributes([
            "Specification-Title": "tntmacro",
            "Specification-Vendor": "AI",
            "Specification-Version": "1",
            "Implementation-Title": "tntmacro",
            "Implementation-Version": "1.0",
            "Implementation-Vendor": "AI"
        ])
    }
}
